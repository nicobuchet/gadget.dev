# .github/workflows/gadget-audit.yml
#
# Runs Gadget audit on a schedule to verify production readiness.
# Also runs on manual trigger for on-demand checks.

name: Gadget Audit

on:
  schedule:
    - cron: "0 6 * * *" # daily at 6:00 UTC
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - name: Run Gadget Audit
        run: pnpm exec gadget audit tests/ --base-url ${{ vars.STAGING_URL }} --reporter console,json,github
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gadget-audit-report
          path: .gadget/results/
          retention-days: 30
